<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 러닝 앱</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MY RUN">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111; --bg2: #1a1a1a; --card: #1f1f1f;
      --text: white; --text2: #aaa; --border: #333;
    }
    body.light {
      --bg: #f5f5f5; --bg2: #e8e8e8; --card: #ffffff;
      --text: #111; --text2: #666; --border: #ddd;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-y: auto;
      transition: background-color 0.3s, color 0.3s;
    }

    .top-bar {
      display: flex; width: 100%;
      justify-content: space-between; align-items: center;
      padding: 16px 16px 0;
    }
    h1 { font-size: 22px; letter-spacing: 2px; color: #f97316; }

    .theme-toggle {
      width: 44px !important; height: 24px !important;
      border-radius: 12px !important;
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      font-size: 14px !important;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0 !important;
    }

    #map { width: 100%; height: 35vh; margin-top: 10px; }

    .stats {
      display: flex; flex-wrap: wrap;
      justify-content: center;
      gap: 20px; margin: 20px 0; padding: 0 16px;
    }
    .stat-box { text-align: center; min-width: 60px; }
    .stat-label { font-size: 12px; color: var(--text2); letter-spacing: 1px; }
    .stat-value { font-size: 32px; font-weight: bold; color: var(--text); }
    .stat-unit { font-size: 13px; color: var(--text2); }

    #weight-display {
      font-size: 12px; color: var(--text2);
      margin-bottom: 10px; cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }

    .run-btns { display: flex; gap: 16px; margin-bottom: 4px; }
    .run-btn {
      width: 110px; height: 110px; border-radius: 50%;
      border: none; font-size: 18px; font-weight: bold;
      cursor: pointer; transition: transform 0.1s;
    }
    .run-btn:active { transform: scale(0.95); }
    #startBtn { background-color: #f97316; color: white; }
    #stopBtn  { background-color: #ef4444; color: white; display: none; }

    #resume-banner {
      display: none;
      background: var(--card);
      border: 1px solid #f97316;
      border-radius: 12px;
      padding: 12px 16px; margin: 10px 16px;
      text-align: center; font-size: 14px;
      color: #f97316; cursor: pointer;
      width: calc(100% - 32px);
    }

    .tab-bar {
      display: flex; width: 100%;
      background: var(--bg2); margin-top: 20px;
      border-bottom: 1px solid var(--border); overflow-x: auto;
    }
    .tab-btn {
      flex: 1; min-width: 60px; width: auto; height: auto;
      border-radius: 0; background: none; color: var(--text2);
      font-size: 12px; padding: 12px 4px;
      border: none; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: #f97316; border-bottom: 2px solid #f97316; }
    .tab-content { display: none; width: 100%; max-width: 480px; padding: 16px; }
    .tab-content.active { display: block; }

    .record-card {
      background-color: var(--card); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .record-date { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .record-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .record-stat { text-align: center; }
    .record-stat span { display: block; font-size: 11px; color: var(--text2); }
    .record-stat strong { font-size: 15px; color: var(--text); }
    .delete-btn {
      width: auto !important; height: auto !important;
      background: none !important; color: #555;
      font-size: 18px; border-radius: 0 !important; border: none; cursor: pointer;
    }

    .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .summary-card { background: var(--card); border-radius: 12px; padding: 14px; text-align: center; }
    .summary-card .s-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .summary-card .s-value { font-size: 22px; font-weight: bold; color: #f97316; }
    .summary-card .s-unit { font-size: 11px; color: var(--text2); }

    .chart-title { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
    .chart-wrap { background: var(--bg2); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin-bottom: 6px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .bar { width: 100%; background: #f97316; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
    .bar.empty { background: var(--border); }
    .bar-label { font-size: 9px; color: var(--text2); margin-top: 4px; text-align: center; }
    .bar-val { font-size: 9px; color: #f97316; margin-bottom: 2px; }

    /* 체중 모달 */
    #weight-modal {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999; align-items: center; justify-content: center;
    }
    #weight-modal.show { display: flex; }
    .modal-box {
      background: var(--card); border-radius: 24px;
      padding: 32px 24px; text-align: center; width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-icon { font-size: 48px; margin-bottom: 12px; }
    .modal-box h2 { font-size: 20px; font-weight: bold; color: var(--text); margin-bottom: 6px; }
    .modal-box p { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
    .weight-input-wrap {
      display: flex; align-items: center; justify-content: center;
      background: var(--bg2); border-radius: 14px;
      border: 2px solid var(--border);
      padding: 12px 16px; margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .weight-input-wrap:focus-within { border-color: #f97316; }
    .weight-input-wrap input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 28px; font-weight: bold;
      width: 80px; text-align: center;
    }
    .weight-input-wrap span { font-size: 16px; color: var(--text2); margin-left: 4px; }
    .modal-confirm-btn {
      width: 100%; height: 52px; border-radius: 26px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white; font-size: 16px; font-weight: bold;
      border: none; cursor: pointer;
      box-shadow: 0 4px 15px rgba(249,115,22,0.4);
      transition: transform 0.1s;
    }
    .modal-confirm-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>🏃 MY RUN</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>

  <div id="resume-banner" onclick="resumeRun()">⚠️ 진행 중인 러닝이 있어요! 탭해서 이어하기</div>
  <div id="map"></div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">거리</div>
      <div class="stat-value" id="distance">0.00</div>
      <div class="stat-unit">km</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">시간</div>
      <div class="stat-value" id="timer">00:00</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">페이스</div>
      <div class="stat-value" id="pace">--'--"</div>
      <div class="stat-unit">/ km</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">칼로리</div>
      <div class="stat-value" id="calories">0</div>
      <div class="stat-unit">kcal</div>
    </div>
  </div>

  <div id="weight-display" onclick="openWeightModal()">⚖️ 체중 설정</div>

  <div class="run-btns">
    <button class="run-btn" id="startBtn" onclick="startRun()">START</button>
    <button class="run-btn" id="stopBtn" onclick="stopRun()">STOP</button>
  </div>

  <!-- 체중 모달 -->
  <div id="weight-modal">
    <div class="modal-box">
      <div class="modal-icon">⚖️</div>
      <h2>체중을 입력해주세요</h2>
      <p>정확한 칼로리 계산을 위해<br>체중이 필요해요</p>
      <div class="weight-input-wrap">
        <input type="number" id="weight-input" placeholder="70" min="30" max="200">
        <span>kg</span>
      </div>
      <button class="modal-confirm-btn" onclick="saveWeight()">저장하기</button>
    </div>
  </div>

  <!-- 탭 바 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('recent')">최근 활동</button>
    <button class="tab-btn" onclick="switchTab('weekly')">주간</button>
    <button class="tab-btn" onclick="switchTab('monthly')">월간</button>
    <button class="tab-btn" onclick="switchTab('yearly')">연간</button>
    <button class="tab-btn" onclick="switchTab('all')">전체</button>
  </div>

  <div class="tab-content active" id="tab-recent">
    <div id="records-list">
      <p style="text-align:center;color:#555;font-size:14px;margin-top:10px;">아직 기록이 없어요. 달려보세요! 🏃</p>
    </div>
  </div>
  <div class="tab-content" id="tab-weekly">
    <div class="stats-summary" id="weekly-summary"></div>
    <div class="chart-wrap"><div class="chart-title">이번 주 거리 (km)</div><div class="bar-chart" id="weekly-chart"></div></div>
  </div>
  <div class="tab-content" id="tab-monthly">
    <div class="stats-summary" id="monthly-summary"></div>
    <div class="chart-wrap"><div class="chart-title">이번 달 거리 (km)</div><div class="bar-chart" id="monthly-chart"></div></div>
  </div>
  <div class="tab-content" id="tab-yearly">
    <div class="stats-summary" id="yearly-summary"></div>
    <div class="chart-wrap"><div class="chart-title">올해 거리 (km)</div><div class="bar-chart" id="yearly-chart"></div></div>
  </div>
  <div class="tab-content" id="tab-all">
    <div class="stats-summary" id="all-summary"></div>
    <div class="chart-wrap"><div class="chart-title">년도별 총 거리 (km)</div><div class="bar-chart" id="all-chart"></div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map;
    let watchId = null, timerInterval = null;
    let seconds = 0, totalDistance = 0;
    let lastPosition = null, routeCoords = [], routeLine = null, startMarker = null;
    let recentPositions = [], isRunning = false;
    let records = JSON.parse(localStorage.getItem('runRecords') || '[]');
    let userWeight = parseFloat(localStorage.getItem('userWeight')) || 0;

    window.addEventListener('load', function() {
      map = L.map('map').setView([37.5665, 126.9780], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeBtn').textContent = '☀️';
      }

      if (!userWeight) openWeightModal();
      else updateWeightDisplay();

      renderRecords();
      checkRunningState();
    });

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light');
      document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    function openWeightModal() {
      document.getElementById('weight-modal').classList.add('show');
      if (userWeight) document.getElementById('weight-input').value = userWeight;
    }

    function saveWeight() {
      const w = parseFloat(document.getElementById('weight-input').value);
      if (!w || w < 30 || w > 200) { alert('30~200kg 사이로 입력해주세요'); return; }
      userWeight = w;
      localStorage.setItem('userWeight', w);
      document.getElementById('weight-modal').classList.remove('show');
      updateWeightDisplay();
    }

    function updateWeightDisplay() {
      document.getElementById('weight-display').textContent = `⚖️ 내 체중: ${userWeight}kg (탭해서 변경)`;
    }

    function calcCalories() {
      if (!userWeight || seconds === 0) return 0;
      return Math.round(8 * userWeight * (seconds / 3600));
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', ['recent','weekly','monthly','yearly','all'][i] === name);
      });
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'weekly') renderWeekly();
      if (name === 'monthly') renderMonthly();
      if (name === 'yearly') renderYearly();
      if (name === 'all') renderAll();
    }

    function renderWeekly() {
      const now = new Date();
      const monday = new Date(now);
      monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
      monday.setHours(0,0,0,0);
      const buckets = Array(7).fill(0);
      let runCount = 0;
      records.forEach(r => {
        const d = new Date(r.id);
        if (d >= monday) { buckets[(d.getDay() + 6) % 7] += parseFloat(r.distance); runCount++; }
      });
      renderBarChart('weekly-chart', buckets, ['월','화','수','목','금','토','일']);
      renderSummary('weekly-summary', records.filter(r => new Date(r.id) >= monday), runCount, 7, '주');
    }

    function renderMonthly() {
      const now = new Date();
      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
      const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const buckets = Array(daysInMonth).fill(0);
      let runCount = 0;
      records.forEach(r => {
        const d = new Date(r.id);
        if (d >= firstDay && d.getMonth() === now.getMonth()) { buckets[d.getDate()-1] += parseFloat(r.distance); runCount++; }
      });
      renderBarChart('monthly-chart', buckets, Array.from({length: daysInMonth}, (_,i) => i+1));
      renderSummary('monthly-summary', records.filter(r => { const d = new Date(r.id); return d >= firstDay && d.getMonth() === now.getMonth(); }), runCount, daysInMonth, '달');
    }

    function renderYearly() {
      const now = new Date();
      const buckets = Array(12).fill(0);
      let runCount = 0;
      records.forEach(r => {
        const d = new Date(r.id);
        if (d.getFullYear() === now.getFullYear()) { buckets[d.getMonth()] += parseFloat(r.distance); runCount++; }
      });
      renderBarChart('yearly-chart', buckets, ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']);
      renderSummary('yearly-summary', records.filter(r => new Date(r.id).getFullYear() === now.getFullYear()), runCount, 52, '년');
    }

    function renderAll() {
      if (records.length === 0) {
        document.getElementById('all-chart').innerHTML = '<p style="color:#555;font-size:13px;">기록이 없어요</p>';
        document.getElementById('all-summary').innerHTML = ''; return;
      }
      const yearMap = {};
      records.forEach(r => { const y = new Date(r.id).getFullYear(); yearMap[y] = (yearMap[y]||0) + parseFloat(r.distance); });
      const years = Object.keys(yearMap).sort();
      renderBarChart('all-chart', years.map(y => yearMap[y]), years);
      renderSummary('all-summary', records, records.length, null, '전체');
    }

    function renderBarChart(id, buckets, labels) {
      const max = Math.max(...buckets, 0.01);
      document.getElementById(id).innerHTML = buckets.map((v, i) => `
        <div class="bar-col">
          <div class="bar-val">${v > 0 ? v.toFixed(1) : ''}</div>
          <div class="bar ${v===0?'empty':''}" style="height:${Math.max((v/max)*90, v>0?4:2)}px"></div>
          <div class="bar-label">${labels[i]}</div>
        </div>`).join('');
    }

    function renderSummary(id, filteredRecords, runCount, periodDays, periodLabel) {
      const totalDist = filteredRecords.reduce((s,r) => s + parseFloat(r.distance), 0);
      const totalSec = filteredRecords.reduce((s,r) => { const [m,sec] = r.time.split(':').map(Number); return s + m*60 + sec; }, 0);
      let avgPace = '--\'--"';
      if (totalDist > 0) { const ps = totalSec/totalDist; avgPace = `${Math.floor(ps/60)}'${String(Math.round(ps%60)).padStart(2,'0')}"`; }
      const freq = periodDays ? (runCount/periodDays).toFixed(2) : runCount;
      const hrs = Math.floor(totalSec/3600), mins = Math.floor((totalSec%3600)/60);
      document.getElementById(id).innerHTML = `
        <div class="summary-card"><div class="s-label">러닝 횟수</div><div class="s-value">${freq}</div><div class="s-unit">${periodDays ? `런닝/${periodLabel}` : '회'}</div></div>
        <div class="summary-card"><div class="s-label">총 거리</div><div class="s-value">${totalDist.toFixed(2)}</div><div class="s-unit">km</div></div>
        <div class="summary-card"><div class="s-label">평균 페이스</div><div class="s-value" style="font-size:18px">${avgPace}</div><div class="s-unit">/ km</div></div>
        <div class="summary-card"><div class="s-label">총 시간</div><div class="s-value" style="font-size:18px">${hrs>0?`${hrs}h ${mins}m`:`${mins}m`}</div><div class="s-unit"></div></div>`;
    }

    function checkRunningState() {
      const saved = localStorage.getItem('currentRun');
      if (!saved) return;
      const data = JSON.parse(saved);
      if (Math.floor((Date.now() - data.startTime) / 1000) > 86400) { localStorage.removeItem('currentRun'); return; }
      document.getElementById('resume-banner').style.display = 'block';
    }

    function resumeRun() {
      const saved = localStorage.getItem('currentRun');
      if (!saved) return;
      const data = JSON.parse(saved);
      seconds = Math.floor((Date.now() - data.startTime) / 1000);
      totalDistance = data.totalDistance;
      routeCoords = data.routeCoords;
      document.getElementById('resume-banner').style.display = 'none';
      document.getElementById('distance').textContent = totalDistance.toFixed(2);
      if (routeCoords.length > 1) {
        routeLine = L.polyline(routeCoords, { color: '#f97316', weight: 4 }).addTo(map);
        map.setView(routeCoords[routeCoords.length-1], 16);
        startMarker = L.circleMarker(routeCoords[0], { color: '#f97316', fillColor: '#f97316', fillOpacity: 1, radius: 8 }).addTo(map);
      }
      startTracking();
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'block';
    }

    function saveRunningState() {
      if (!isRunning) return;
      localStorage.setItem('currentRun', JSON.stringify({ startTime: Date.now() - seconds*1000, totalDistance, routeCoords }));
    }

    function startRun() {
      seconds = 0; totalDistance = 0; routeCoords = [];
      lastPosition = null; recentPositions = []; startMarker = null;
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'block';
      localStorage.setItem('currentRun', JSON.stringify({ startTime: Date.now(), totalDistance: 0, routeCoords: [] }));
      startTracking();
    }

    function startTracking() {
      isRunning = true;
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = formatTime(seconds);
        updatePace();
        document.getElementById('calories').textContent = calcCalories();
        saveRunningState();
      }, 1000);
      watchId = navigator.geolocation.watchPosition(
        (position) => {
          const { latitude, longitude, accuracy } = position.coords;
          if (accuracy > 50) return;
          const latlng = [latitude, longitude];
          const now = Date.now();
          map.setView(latlng, 16);
          if (!startMarker) {
            startMarker = L.circleMarker(latlng, { color: '#f97316', fillColor: '#f97316', fillOpacity: 1, radius: 8 }).addTo(map).bindPopup('시작 지점').openPopup();
          }
          routeCoords.push(latlng);
          if (routeLine) map.removeLayer(routeLine);
          routeLine = L.polyline(routeCoords, { color: '#f97316', weight: 4 }).addTo(map);
          if (lastPosition) {
            const dist = calcDistance(lastPosition.lat, lastPosition.lng, latitude, longitude);
            totalDistance += dist;
            document.getElementById('distance').textContent = totalDistance.toFixed(2);
          }
          if (window._currentMarker) map.removeLayer(window._currentMarker);
          window._currentMarker = L.circleMarker(latlng, { color: 'white', fillColor: '#3b82f6', fillOpacity: 1, radius: 7, weight: 2 }).addTo(map);
          const prevKm = Math.floor(totalDistance - (lastPosition ? calcDistance(lastPosition.lat, lastPosition.lng, latitude, longitude) : 0));
          const currKm = Math.floor(totalDistance);
          if (currKm > prevKm && currKm > 0) {
            if (navigator.vibrate) navigator.vibrate([200,100,200]);
            try {
              const ctx = new AudioContext(), o = ctx.createOscillator(), g = ctx.createGain();
              o.connect(g); g.connect(ctx.destination);
              o.frequency.value = 880;
              g.gain.setValueAtTime(0.3, ctx.currentTime);
              g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
              o.start(); o.stop(ctx.currentTime + 0.5);
            } catch(e) {}
          }
          recentPositions.push({ lat: latitude, lng: longitude, time: now });
          recentPositions = recentPositions.filter(p => now - p.time < 60000);
          lastPosition = { lat: latitude, lng: longitude };
        },
        (error) => alert('GPS 오류: ' + error.message),
        { enableHighAccuracy: true, maximumAge: 0 }
      );
    }

    function updatePace() {
      if (recentPositions.length < 2) return;
      const oldest = recentPositions[0], newest = recentPositions[recentPositions.length-1];
      const timeDiff = (newest.time - oldest.time) / 1000;
      let recentDist = 0;
      for (let i = 1; i < recentPositions.length; i++) {
        recentDist += calcDistance(recentPositions[i-1].lat, recentPositions[i-1].lng, recentPositions[i].lat, recentPositions[i].lng);
      }
      if (recentDist < 0.01) return;
      const ps = timeDiff / recentDist;
      document.getElementById('pace').textContent = `${Math.floor(ps/60)}'${String(Math.round(ps%60)).padStart(2,'0')}"`;
    }

    function stopRun() {
      isRunning = false;
      document.getElementById('startBtn').style.display = 'block';
      document.getElementById('stopBtn').style.display = 'none';
      clearInterval(timerInterval);
      navigator.geolocation.clearWatch(watchId);
      localStorage.removeItem('currentRun');
      const finalCalories = calcCalories();
      if (totalDistance > 0.01) {
        const now = new Date();
        records.unshift({
          id: Date.now(),
          date: now.toLocaleDateString('ko-KR', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }),
          distance: totalDistance.toFixed(2),
          time: formatTime(seconds),
          pace: document.getElementById('pace').textContent,
          calories: finalCalories
        });
        localStorage.setItem('runRecords', JSON.stringify(records));
        renderRecords();
      }
      alert(`🏃 러닝 완료!\n거리: ${totalDistance.toFixed(2)} km\n시간: ${formatTime(seconds)}\n페이스: ${document.getElementById('pace').textContent} / km\n칼로리: ${finalCalories} kcal`);
      seconds = 0; totalDistance = 0; lastPosition = null;
      routeCoords = []; startMarker = null; recentPositions = [];
      document.getElementById('distance').textContent = '0.00';
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('pace').textContent = `--'--"`;
      document.getElementById('calories').textContent = '0';
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
      if (window._currentMarker) { map.removeLayer(window._currentMarker); window._currentMarker = null; }
    }

    function renderRecords() {
      const list = document.getElementById('records-list');
      if (records.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#555;font-size:14px;margin-top:10px;">아직 기록이 없어요. 달려보세요! 🏃</p>';
        return;
      }
      list.innerHTML = records.map(r => `
        <div class="record-card">
          <div>
            <div class="record-date">${r.date}</div>
            <div class="record-stats">
              <div class="record-stat"><strong>${r.distance}</strong><span>km</span></div>
              <div class="record-stat"><strong>${r.time}</strong><span>시간</span></div>
              <div class="record-stat"><strong>${r.pace}</strong><span>페이스</span></div>
              ${r.calories ? `<div class="record-stat"><strong>${r.calories}</strong><span>kcal</span></div>` : ''}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteRecord(${r.id})">🗑️</button>
        </div>`).join('');
    }

    function deleteRecord(id) {
      records = records.filter(r => r.id !== id);
      localStorage.setItem('runRecords', JSON.stringify(records));
      renderRecords();
    }

    function formatTime(s) {
      return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    function calcDistance(lat1, lng1, lat2, lng2) {
      const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
  </script>
</body>
